name: Upload Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      # Hashed/static assets: long-lived cache.
      - name: Sync static assets (immutable cache)
        run: |
          aws s3 sync . s3://${{ secrets.AWS_S3_BUCKET }}/ \
            --acl public-read \
            --delete \
            --exclude "*" \
            --include "embedded-data.js" \
            --include "sw.js" \
            --include "manifest.json" \
            --include "robots.txt" \
            --include "sitemap.xml" \
            --cache-control "public, max-age=3600"

      # HTML: short cache so deploys are picked up quickly.
      - name: Sync HTML (short cache)
        run: |
          aws s3 sync . s3://${{ secrets.AWS_S3_BUCKET }}/ \
            --acl public-read \
            --delete \
            --exclude "*" \
            --include "index.html" \
            --include "*.html" \
            --cache-control "no-cache"

      # Catch-all (anything not matched above) without --delete to be safe.
      - name: Sync remaining files
        run: |
          aws s3 sync . s3://${{ secrets.AWS_S3_BUCKET }}/ \
            --acl public-read \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "README.md"
